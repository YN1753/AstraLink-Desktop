name: Release

on:
  push:
    tags:
      - 'v*' # 当推送 v1.0.0, v2.1.0 等标签时触发

permissions:
  contents: write # 赋予创建 Release 和上传附件的权限

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true # 开启 Go 模块缓存

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          Write-Host "NSIS path:"
          where.exe makensis 2>&1 || Write-Host "makensis not in PATH"

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # 构建 NSIS 安装版（同时产出应用 exe 和安装程序 exe）
      - name: Build NSIS installer
        run: wails build -nsis -ldflags "-X main.AppVersion=${{ steps.version.outputs.VERSION }}"

      - name: Package artifacts
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          Write-Host "--- build/bin contents ---"
          Get-ChildItem build/bin/ | Format-Table Name, Length

          # 安装程序：找 *-installer.exe 并重命名
          $installer = Get-ChildItem "build/bin/*-installer.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installer) {
            Write-Error "NSIS installer not found! Files in build/bin:"
            Get-ChildItem build/bin/
            exit 1
          }
          $setupName = "AstraLink-$ver-windows-setup.exe"
          Move-Item $installer.FullName $setupName
          Write-Host "Setup: $($installer.Name) -> $setupName"

          # 便携版：用 AstraLink.exe 打包
          $app = "build/bin/AstraLink.exe"
          if (Test-Path $app) {
            $portName = "AstraLink-$ver-windows-portable.exe"
            $zipName = "AstraLink-$ver-windows-portable.zip"
            Copy-Item $app $portName
            New-Item -Path ".portable" -ItemType file -Force | Out-Null
            Compress-Archive -Path $portName, ".portable" -DestinationPath $zipName
            Write-Host "Portable: $zipName"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: |
            AstraLink-*-windows-portable.zip
            AstraLink-*-windows-setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build macOS App
        run: wails build -ldflags "-X main.AppVersion=${{ steps.version.outputs.VERSION }}"

      - name: Create portable zip
        run: |
          cd build/bin
          touch .portable
          zip -r "../../AstraLink-${{ steps.version.outputs.VERSION }}-macos-portable.zip" . .portable

      - name: Create DMG installer
        run: |
          mkdir dmg-staging
          cp -r build/bin/*.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "AstraLink" -srcfolder dmg-staging -ov -format UDZO "AstraLink-${{ steps.version.outputs.VERSION }}-macos.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: |
            AstraLink-*-macos-portable.zip
            AstraLink-*-macos.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*