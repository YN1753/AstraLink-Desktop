name: Release

on:
  push:
    tags:
      - 'v*' # 当推送 v1.0.0, v2.1.0 等标签时触发

permissions:
  contents: write # 赋予创建 Release 和上传附件的权限

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true # 开启 Go 模块缓存

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        shell: bash
        run: choco install nsis -y

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # 1. 构建便携版 (Portable)
      - name: Build portable exe
        run: wails build -ldflags "-X main.AppVersion=${{ steps.version.outputs.VERSION }}"

      - name: Prepare portable package
        shell: pwsh
        run: |
          Rename-Item "build/bin/AstraLink.exe" "AstraLink-${{ steps.version.outputs.VERSION }}-windows-portable.exe"
          New-Item -Path "build/bin/.portable" -ItemType "file"
          Compress-Archive -Path `
            "build/bin/AstraLink-${{ steps.version.outputs.VERSION }}-windows-portable.exe", `
            "build/bin/.portable" `
            -DestinationPath "AstraLink-${{ steps.version.outputs.VERSION }}-windows-portable.zip"

      # 2. 构建 NSIS 安装版 (Setup)
      - name: Build NSIS installer
        shell: bash
        run: |
          wails build -nsis -ldflags "-X main.AppVersion=${{ steps.version.outputs.VERSION }}"
          echo "--- build/bin contents ---"
          ls -la build/bin/

      - name: Rename installer
        shell: pwsh
        run: |
          $installer = "build/bin/AstraLink.exe"
          if (Test-Path $installer) {
            Rename-Item $installer "build/bin/AstraLink-${{ steps.version.outputs.VERSION }}-windows-setup.exe"
          } else {
            Write-Error "AstraLink.exe not found in build/bin/"
            exit 1
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: |
            AstraLink-*-windows-portable.zip
            build/bin/*-setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build macOS App
        run: wails build -ldflags "-X main.AppVersion=${{ steps.version.outputs.VERSION }}"

      - name: Create portable zip
        run: |
          cd build/bin
          touch .portable
          zip -r "../../AstraLink-${{ steps.version.outputs.VERSION }}-macos-portable.zip" . .portable

      - name: Create DMG installer
        run: |
          mkdir dmg-staging
          cp -r build/bin/*.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "AstraLink" -srcfolder dmg-staging -ov -format UDZO "AstraLink-${{ steps.version.outputs.VERSION }}-macos.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: |
            AstraLink-*-macos-portable.zip
            AstraLink-*-macos.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*